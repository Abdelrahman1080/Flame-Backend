spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/flamedb
    username: postgres
    password: "root"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

gcs:
  bucket:
    name: flame-reels-bucket

google:
  application:
    credentials: ./flame-credentials.json

gemini:
  api:
    key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash

server:
  port: 8080
